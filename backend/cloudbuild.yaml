steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ujjwal-bhavishya-api:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ujjwal-bhavishya-api:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend/'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ujjwal-bhavishya-api']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'ujjwal-bhavishya-api'
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ujjwal-bhavishya-api:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
options:
  logging: CLOUD_LOGGING_ONLY
